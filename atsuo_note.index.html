<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%234a7ba8'/><text x='50' y='62' font-family='serif' font-size='48' fill='%23ffffff' text-anchor='middle'>n</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f3f7fb;
    --bg-soft: #e8eff7;
    --ink: #1a3a5c;
    --ink-soft: #3d5b7d;
    --ink-mute: #8aa3bd;
    --line: #d8e3ef;
    --line-soft: #e8eef5;
    --paper: #ffffff;
    --accent: #4a7ba8;
    --accent-soft: #6b9bc8;
    --accent-deep: #3d6a93;
    --fav: #d97757;
    --fav-soft: #f0c4b0;
    --done: #5a9a78;
    --done-soft: #d5e8dc;
    --shadow: 0 1px 2px rgba(74,123,168,0.06), 0 8px 24px rgba(74,123,168,0.08);
    --serif-jp: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --serif-en: "Cormorant Garamond", "Shippori Mincho", serif;
    --sans: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif-jp);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  header {
    padding: 24px 24px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(243, 247, 251, 0.88);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .header-inner { display: flex; align-items: baseline; justify-content: space-between; max-width: 720px; margin: 0 auto; }
  .brand { font-family: var(--serif-en); font-size: 24px; font-weight: 400; letter-spacing: 0.08em; color: var(--ink); }
  .brand-sub { font-family: var(--serif-jp); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.3em; margin-top: 4px; }
  .counter { font-family: var(--serif-en); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.15em; }

  .tabs {
    display: flex; gap: 4px;
    max-width: 720px; margin: 16px auto 0;
    padding: 4px; background: var(--bg-soft); border-radius: 8px;
  }
  .tab {
    flex: 1; padding: 10px 12px;
    background: transparent; border: none;
    font-family: var(--serif-jp); font-size: 13px; color: var(--ink-soft);
    cursor: pointer; border-radius: 6px;
    transition: all 0.2s ease; letter-spacing: 0.05em;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab.active {
    background: var(--paper); color: var(--accent);
    box-shadow: 0 1px 3px rgba(74,123,168,0.1); font-weight: 500;
  }
  .tab-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 6px;
    background: var(--bg-soft); color: var(--ink-mute);
    font-family: var(--serif-en); font-size: 10px;
    border-radius: 9px; letter-spacing: 0;
  }
  .tab.active .tab-badge { background: var(--accent); color: var(--paper); }

  main { max-width: 720px; margin: 0 auto; padding: 28px 24px 120px; }

  .section-label {
    font-family: var(--serif-en); font-size: 10px;
    letter-spacing: 0.4em; color: var(--ink-mute);
    text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .themes { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 36px; }
  @media (min-width: 480px) {
    .themes { grid-template-columns: repeat(2, 1fr); }
    .theme-card.all { grid-column: 1 / -1; }
  }
  .theme-card {
    background: var(--paper); border: 1px solid var(--line);
    padding: 18px 20px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-align: left; font-family: inherit; color: var(--ink);
    border-radius: 4px;
  }
  .theme-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
  .theme-card.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .theme-card-num { font-family: var(--serif-en); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-mute); margin-bottom: 6px; display: block; }
  .theme-card.active .theme-card-num { color: rgba(255,255,255,0.65); }
  .theme-card-title { font-family: var(--serif-jp); font-size: 16px; font-weight: 500; line-height: 1.45; letter-spacing: 0.02em; }
  .theme-card-count { font-family: var(--serif-en); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.15em; margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .theme-card.active .theme-card-count { color: rgba(255,255,255,0.75); }
  .theme-progress {
    flex: 1; height: 2px; background: var(--line); border-radius: 1px; overflow: hidden;
  }
  .theme-card.active .theme-progress { background: rgba(255,255,255,0.25); }
  .theme-progress-bar {
    height: 100%; background: var(--done); border-radius: 1px;
    transition: width 0.4s ease;
  }
  .theme-card.active .theme-progress-bar { background: rgba(255,255,255,0.9); }

  .idea-stage {
    background: var(--paper); border: 1px solid var(--line);
    padding: 32px 26px 28px; min-height: 360px; margin-bottom: 22px;
    position: relative; box-shadow: var(--shadow); border-radius: 4px;
  }
  .idea-stage::before {
    content: ''; position: absolute;
    top: 12px; left: 12px; right: 12px; bottom: 12px;
    border: 1px solid var(--line-soft); pointer-events: none; border-radius: 2px;
  }
  .idea-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px; padding-bottom: 14px;
    border-bottom: 1px solid var(--line-soft);
    position: relative; z-index: 1;
  }
  .idea-theme { font-family: var(--serif-en); font-size: 10px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
  .idea-meta-right { display: flex; align-items: center; gap: 14px; }
  .idea-no { font-family: var(--serif-en); font-size: 28px; font-weight: 300; color: var(--ink); line-height: 1; }
  .idea-no .hash { font-size: 14px; color: var(--ink-mute); margin-right: 2px; }

  .fav-toggle, .done-toggle {
    background: transparent; border: none; cursor: pointer;
    padding: 6px; font-size: 22px; line-height: 1;
    color: var(--ink-mute); transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .fav-toggle:hover, .done-toggle:hover { transform: scale(1.1); }
  .fav-toggle:active, .done-toggle:active { transform: scale(0.95); }
  .fav-toggle.is-fav { color: var(--fav); animation: pop 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .done-toggle { font-size: 18px; }
  .done-toggle.is-done { color: var(--done); animation: pop 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

  /* 執筆済みネタの全体トーン */
  .idea-card.is-done .idea-title {
    color: var(--ink-soft);
  }
  .idea-card.is-done .idea-title::after {
    content: ' ✓';
    color: var(--done);
    font-family: var(--serif-en);
    font-weight: 400;
  }

  /* 執筆済みバッジ */
  .done-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px;
    background: var(--done-soft); color: var(--done);
    font-family: var(--serif-en); font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    border-radius: 10px;
    border: 1px solid var(--done);
  }

  .idea-title { font-family: var(--serif-jp); font-size: 22px; font-weight: 600; line-height: 1.5; letter-spacing: 0.01em; margin-bottom: 24px; color: var(--ink); position: relative; z-index: 1; }
  .idea-section { margin-bottom: 20px; position: relative; z-index: 1; }
  .idea-section-label {
    font-family: var(--serif-en); font-size: 10px; letter-spacing: 0.35em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 9px; display: flex; align-items: center; gap: 8px;
  }
  .idea-section-label::before { content: ''; width: 14px; height: 1px; background: var(--accent); }
  .idea-intro { font-family: var(--serif-jp); font-size: 14px; line-height: 1.85; color: var(--ink-soft); letter-spacing: 0.02em; }
  .idea-points { list-style: none; padding: 0; }
  .idea-points li {
    font-family: var(--serif-jp); font-size: 13.5px; line-height: 1.8;
    color: var(--ink-soft); padding-left: 18px; position: relative; margin-bottom: 5px;
  }
  .idea-points li::before { content: '—'; position: absolute; left: 0; color: var(--accent-soft); }
  .idea-question {
    font-family: var(--serif-jp); font-size: 13.5px; line-height: 1.85;
    color: var(--ink); font-style: italic;
    padding: 14px 16px; background: var(--bg-soft);
    border-left: 3px solid var(--accent); letter-spacing: 0.02em; border-radius: 0 3px 3px 0;
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; text-align: center; padding: 20px;
    position: relative; z-index: 1;
  }
  .empty-state-icon { font-family: var(--serif-en); font-size: 60px; font-weight: 300; color: var(--accent-soft); margin-bottom: 16px; letter-spacing: -0.02em; }
  .empty-state-text { font-family: var(--serif-jp); font-size: 14px; color: var(--ink-mute); line-height: 1.85; letter-spacing: 0.05em; }

  .fade-in { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .actions { display: flex; gap: 10px; margin-bottom: 28px; }
  .btn {
    flex: 1; padding: 18px 20px;
    font-family: var(--serif-jp); font-size: 14px; font-weight: 500;
    letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s ease;
    border: 1px solid var(--accent); background: var(--accent); color: var(--paper);
    position: relative; overflow: hidden; border-radius: 4px;
  }
  .btn:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .btn:active { transform: scale(0.98); }
  .btn-secondary {
    background: var(--paper); color: var(--accent); border-color: var(--accent);
    flex: 0 0 auto; padding: 18px 22px; font-size: 16px;
  }
  .btn-secondary:hover { background: var(--bg-soft); }
  .btn .arrow { font-family: var(--serif-en); margin-left: 8px; display: inline-block; transition: transform 0.2s ease; }
  .btn:hover .arrow { transform: translateX(4px); }

  .fav-list { display: flex; flex-direction: column; gap: 8px; }
  .fav-item {
    background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .fav-item:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-1px); }
  .fav-item-body { flex: 1; min-width: 0; }
  .fav-item-meta { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; flex-wrap: wrap; }
  .fav-item-theme { font-family: var(--serif-en); font-size: 9px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; }
  .fav-item-no { font-family: var(--serif-en); font-size: 11px; color: var(--ink-mute); }
  .fav-item-title { font-family: var(--serif-jp); font-size: 14.5px; font-weight: 500; line-height: 1.5; color: var(--ink); }
  .fav-item-remove {
    background: transparent; border: none; cursor: pointer;
    color: var(--ink-mute); font-size: 18px; padding: 4px 8px; line-height: 1;
    transition: color 0.2s ease; flex-shrink: 0;
  }
  .fav-item-remove:hover { color: var(--fav); }
  .fav-empty {
    text-align: center; padding: 60px 20px; color: var(--ink-mute);
    font-family: var(--serif-jp); font-size: 13px; line-height: 1.85;
    background: var(--paper); border: 1px dashed var(--line); border-radius: 4px;
  }
  .fav-empty-icon { font-size: 32px; color: var(--fav-soft); margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper);
    padding: 12px 22px; border-radius: 24px;
    font-family: var(--serif-jp); font-size: 13px; letter-spacing: 0.05em;
    box-shadow: 0 8px 24px rgba(26,58,92,0.25);
    opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .install-hint {
    text-align: center; padding: 16px;
    font-family: var(--serif-jp); font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.1em; line-height: 1.85;
    border-top: 1px solid var(--line-soft); margin-top: 24px;
  }
  .install-hint kbd {
    font-family: var(--sans); font-size: 10px;
    padding: 2px 6px; background: var(--paper); border: 1px solid var(--line);
    border-radius: 3px; margin: 0 2px; color: var(--ink-soft);
  }

  footer { text-align: center; padding: 20px; font-family: var(--serif-en); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.3em; }
  .ornament { text-align: center; font-family: var(--serif-en); color: var(--accent-soft); font-size: 14px; letter-spacing: 1em; margin: 6px 0 22px; opacity: 0.55; }

  @media (max-width: 480px) {
    header { padding: 18px 18px 14px; }
    main { padding: 24px 18px 100px; }
    .idea-stage { padding: 26px 22px 22px; }
    .idea-title { font-size: 19px; }
    .btn { font-size: 13px; padding: 16px 18px; }
    .brand { font-size: 21px; }
    .tabs { margin-top: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="brand">note ideas</div>
      <div class="brand-sub">ネ タ 帳</div>
    </div>
    <div class="counter" id="counter">— / —</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-view="random"><span>ネタを引く</span></button>
    <button class="tab" data-view="favorites">
      <span>お気に入り</span>
      <span class="tab-badge" id="favBadge">0</span>
    </button>
    <button class="tab" data-view="done">
      <span>執筆済み</span>
      <span class="tab-badge" id="doneBadge">0</span>
    </button>
  </div>
</header>

<main>
  <section id="randomView">
    <div class="section-label">Theme</div>
    <div class="themes" id="themes"></div>

    <div class="section-label">Idea</div>
    <div class="ornament">· · ·</div>
    <div class="idea-stage" id="ideaStage">
      <div class="empty-state">
        <div class="empty-state-icon">✎</div>
        <div class="empty-state-text">テーマを選んで<br>「ネタを引く」を押してください</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="drawBtn">ネ タ を 引 く<span class="arrow">→</span></button>
      <button class="btn btn-secondary" id="copyBtn" title="コピー" aria-label="クリップボードにコピー">⎘</button>
    </div>

    <div class="install-hint">
      ホーム画面に追加するには<br>
      iOS: 共有 → <kbd>ホーム画面に追加</kbd><br>
      Android: メニュー → <kbd>ホーム画面に追加</kbd>
    </div>
  </section>

  <section id="favoritesView" style="display:none;">
    <div class="section-label">Favorites</div>
    <div id="favList"></div>
  </section>

  <section id="doneView" style="display:none;">
    <div class="section-label">Done</div>
    <div id="doneList"></div>
  </section>
</main>

<footer>EST. 2026</footer>

<div class="toast" id="toast"></div>

<script>
const DATA = {
  themes: [
    {
      id: 'camera',
      name: 'SONYカメラ・動画・写真・S-Log',
      ideas: [
        { n: 1, title: 'S-Logは難しくない、たぶん', intro: 'S-Logと聞くと身構える人が多いけれど、実は「後で味付けする前提の素材」という考え方さえ掴めば怖くない。', points: ['S-Logが「眠い映像」に見える本当の理由', '撮影時に意識すべき露出の基準(+1〜2EV)', '最初の一歩としてのLUT当ての習慣化'], q: 'あなたが最初にS-Logで撮ったとき、いちばん戸惑ったポイントは何でしたか?' },
        { n: 2, title: 'SONY機を選び続ける個人的な理由', intro: '他社の良さも知った上で、それでも私はSONYに戻ってくる。その理由を正直に書いてみたい。', points: ['AF性能が現場の心理的余裕を生む話', 'レンズ資産の積み上がり方', '動画と写真のハイブリッド運用での強み'], q: 'あなたがカメラメーカーを選ぶとき、決め手になっているのは何ですか?' },
        { n: 3, title: '露出は「正解」より「意図」', intro: '適正露出という言葉に縛られていた頃の自分に、いま伝えたいことがある。', points: ['ヒストグラムを読むより大切なこと', 'S-Logでの「右寄せ」の実際の塩梅', '失敗を恐れず意図的にズラす練習法'], q: 'あなたは撮影中、どんな指標で露出を決めていますか?' },
        { n: 4, title: '動画と写真、頭の切り替え方', intro: '同じカメラでも、動画モードと写真モードでは脳の使い方がまったく違う。', points: ['「瞬間」を捉える写真の思考', '「時間」を編む動画の思考', '一日のうちで両方撮るときのコツ'], q: 'あなたは動画派ですか、写真派ですか? その理由も聞かせてください。' },
        { n: 5, title: 'はじめてのカラーグレーディング', intro: 'S-Logで撮った素材を前にして、固まってしまった日のことを今でも覚えている。', points: ['LUTを当てるだけで終わらせない発想', '色の三要素(露出・コントラスト・彩度)の順番', '「やりすぎ」を見抜くチェック方法'], q: 'カラーグレーディングで一番難しいと感じる工程はどこですか?' },

let selectedThemeId = 'all';

let dones = loadList('note-ideas-dones-v1');

const ideaStageEl = document.getElementById('ideaStage');

const copyBtn = document.getElementById('copyBtn');

const doneBadgeEl = document.getElementById('doneBadge');

const favoritesViewEl = document.getElementById('favoritesView');
const doneViewEl = document.getElementById('doneView');

const doneListEl = document.getElementById('doneList');

function loadList(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}
function saveList(key, list) {
  try { localStorage.setItem(key, JSON.stringify(list)); }
  catch (e) { console.warn('保存に失敗:', e); }
}
function isFav(themeId, n) {
  return favorites.some(f => f.themeId === themeId && f.n === n);
}
function isDone(themeId, n) {
  return dones.some(d => d.themeId === themeId && d.n === n);
}
function toggleFav(themeId, n) {
  if (isFav(themeId, n)) {
    favorites = favorites.filter(f => !(f.themeId === themeId && f.n === n));
    showToast('お気に入りから外しました');
  } else {
    favorites.push({ themeId, n });
    showToast('♥ お気に入りに追加しました');
  }
  saveList('note-ideas-favs-v1', favorites);
  updateBadges();
  if (currentView === 'favorites') renderFavorites();
}
function toggleDone(themeId, n) {
  if (isDone(themeId, n)) {
    dones = dones.filter(d => !(d.themeId === themeId && d.n === n));
    showToast('執筆済みを取り消しました');
  } else {
    dones.push({ themeId, n, doneAt: Date.now() });
    showToast('✓ 執筆済みにしました');
  }
  saveList('note-ideas-dones-v1', dones);
  updateBadges();
  renderThemes(); // 進捗バー更新
  if (currentView === 'done') renderDones();
  if (currentView === 'favorites') renderFavorites(); // お気に入り側のバッジも更新
}
function updateBadges() {
  favBadgeEl.textContent = favorites.length;
  doneBadgeEl.textContent = dones.length;
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderThemes() {
  const totalIdeas = DATA.themes.reduce((s, t) => s + t.ideas.length, 0);
  const totalDones = dones.length;
  const allPct = totalIdeas > 0 ? (totalDones / totalIdeas) * 100 : 0;
  let html = `
    <button class="theme-card all ${selectedThemeId === 'all' ? 'active' : ''}" data-id="all">
      <span class="theme-card-num">00</span>
      <div class="theme-card-title">すべてのテーマから</div>
      <div class="theme-card-count">
        <span>${totalDones} / ${totalIdeas}</span>
        <span class="theme-progress"><span class="theme-progress-bar" style="width:${allPct}%"></span></span>
      </div>
    </button>
  `;
  DATA.themes.forEach((theme, i) => {
    const num = String(i + 1).padStart(2, '0');
    const doneCount = dones.filter(d => d.themeId === theme.id).length;
    const pct = theme.ideas.length > 0 ? (doneCount / theme.ideas.length) * 100 : 0;
    html += `
      <button class="theme-card ${selectedThemeId === theme.id ? 'active' : ''}" data-id="${theme.id}">
        <span class="theme-card-num">${num}</span>
        <div class="theme-card-title">${escapeHtml(theme.name)}</div>
        <div class="theme-card-count">
          <span>${doneCount} / ${theme.ideas.length}</span>
          <span class="theme-progress"><span class="theme-progress-bar" style="width:${pct}%"></span></span>
        </div>
      </button>
    `;
  });
  themesEl.innerHTML = html;
  themesEl.querySelectorAll('.theme-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedThemeId = card.dataset.id;
      renderThemes();
      updateCounter();
    });
  });
  updateCounter();
}

function updateCounter() {
  if (selectedThemeId === 'all') {
    const total = DATA.themes.reduce((s, t) => s + t.ideas.length, 0);
    counterEl.textContent = `${dones.length} / ${total}`;
  } else {
    const theme = DATA.themes.find(t => t.id === selectedThemeId);
    const doneCount = dones.filter(d => d.themeId === selectedThemeId).length;
    counterEl.textContent = `${doneCount} / ${theme.ideas.length}`;
  }
}

function getAvailableIdeas() {
  if (selectedThemeId === 'all') {
    const pool = [];
    DATA.themes.forEach(theme => {
      theme.ideas.forEach(idea => {
        pool.push({ ...idea, themeName: theme.name, themeId: theme.id });
      });
    });
    return pool;
  } else {
    const theme = DATA.themes.find(t => t.id === selectedThemeId);
    return theme.ideas.map(i => ({ ...i, themeName: theme.name, themeId: theme.id }));
  }
}

function drawIdea() {
  const pool = getAvailableIdeas();
  if (pool.length === 0) return;
  const recentLimit = Math.min(10, Math.floor(pool.length * 0.7));
  let candidates = pool.filter(i => !history.some(h => h.themeId === i.themeId && h.n === i.n));
  if (candidates.length === 0) { history = []; candidates = pool; }
  const idea = candidates[Math.floor(Math.random() * candidates.length)];
  currentIdea = idea;
  history.push({ themeId: idea.themeId, n: idea.n });
  if (history.length > recentLimit) history.shift();
  renderIdea(idea);
}

function renderIdea(idea) {
  const num = String(idea.n).padStart(2, '0');
  const pointsHtml = idea.points.map(p => `<li>${escapeHtml(p)}</li>`).join('');
  const faved = isFav(idea.themeId, idea.n);
  const done = isDone(idea.themeId, idea.n);
  ideaStageEl.innerHTML = `
    <div class="idea-card fade-in ${done ? 'is-done' : ''}">
      <div class="idea-meta">
        <span class="idea-theme">${escapeHtml(idea.themeName)}</span>
        <div class="idea-meta-right">
          <span class="idea-no"><span class="hash">№</span>${num}</span>
          <button class="done-toggle ${done ? 'is-done' : ''}" aria-label="執筆済みにする" aria-pressed="${done}" title="執筆済み">
            ${done ? '✓' : '○'}
          </button>
          <button class="fav-toggle ${faved ? 'is-fav' : ''}" aria-label="お気に入りに追加" aria-pressed="${faved}" title="お気に入り">
            ${faved ? '♥' : '♡'}
          </button>
        </div>
      </div>
      <h2 class="idea-title">${escapeHtml(idea.title)}</h2>
      <div class="idea-section">
        <div class="idea-section-label">Intro</div>
        <p class="idea-intro">${escapeHtml(idea.intro)}</p>
      </div>
      <div class="idea-section">
        <div class="idea-section-label">Points</div>
        <ul class="idea-points">${pointsHtml}</ul>
      </div>
      <div class="idea-section">
        <div class="idea-section-label">Question</div>
        <p class="idea-question">${escapeHtml(idea.q)}</p>
      </div>
    </div>
  `;
  const favBtn = ideaStageEl.querySelector('.fav-toggle');
  favBtn.addEventListener('click', () => {
    toggleFav(idea.themeId, idea.n);
    const nowFav = isFav(idea.themeId, idea.n);
    favBtn.classList.toggle('is-fav', nowFav);
    favBtn.textContent = nowFav ? '♥' : '♡';
    favBtn.setAttribute('aria-pressed', nowFav);
  });
  const doneBtn = ideaStageEl.querySelector('.done-toggle');
  doneBtn.addEventListener('click', () => {
    toggleDone(idea.themeId, idea.n);
    const nowDone = isDone(idea.themeId, idea.n);
    doneBtn.classList.toggle('is-done', nowDone);
    doneBtn.textContent = nowDone ? '✓' : '○';
    doneBtn.setAttribute('aria-pressed', nowDone);
    ideaStageEl.querySelector('.idea-card').classList.toggle('is-done', nowDone);
  });
}

function renderFavorites() {
  if (favorites.length === 0) {
    favListEl.innerHTML = `
      <div class="fav-empty">
        <div class="fav-empty-icon">♡</div>
        まだお気に入りはありません<br>
        ネタを開いて<strong>♡</strong>をタップすると登録されます
      </div>
    `;
    return;
  }
  const items = [...favorites].reverse().map(f => {
    const theme = DATA.themes.find(t => t.id === f.themeId);
    if (!theme) return '';
    const idea = theme.ideas.find(i => i.n === f.n);
    if (!idea) return '';
    const num = String(idea.n).padStart(2, '0');
    const done = isDone(f.themeId, f.n);
    return `
      <div class="fav-item" data-theme="${f.themeId}" data-n="${f.n}">
        <div class="fav-item-body">
          <div class="fav-item-meta">
            <span class="fav-item-theme">${escapeHtml(theme.name)}</span>
            <span class="fav-item-no">№${num}</span>
            ${done ? '<span class="done-badge">✓ 執筆済</span>' : ''}
          </div>
          <div class="fav-item-title">${escapeHtml(idea.title)}</div>
        </div>
        <button class="fav-item-remove" aria-label="お気に入り解除" title="お気に入り解除">×</button>
      </div>
    `;
  }).join('');
  favListEl.innerHTML = `<div class="fav-list">${items}</div>`;
  favListEl.querySelectorAll('.fav-item').forEach(el => {
    const themeId = el.dataset.theme;
    const n = Number(el.dataset.n);
    el.addEventListener('click', (e) => {
      if (e.target.closest('.fav-item-remove')) return;
      openIdea(themeId, n);
    });
    el.querySelector('.fav-item-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(themeId, n);
    });
  });
}

function renderDones() {
  if (dones.length === 0) {
    doneListEl.innerHTML = `
      <div class="fav-empty">
        <div class="fav-empty-icon" style="color: var(--done-soft);">✓</div>
        まだ執筆済みのネタはありません<br>
        ネタを開いて<strong>○</strong>をタップすると記録されます
      </div>
    `;
    return;
  }
  // テーマごとにグループ化、新しい執筆順に
  const sorted = [...dones].sort((a, b) => (b.doneAt || 0) - (a.doneAt || 0));
  const items = sorted.map(d => {
    const theme = DATA.themes.find(t => t.id === d.themeId);
    if (!theme) return '';
    const idea = theme.ideas.find(i => i.n === d.n);
    if (!idea) return '';
    const num = String(idea.n).padStart(2, '0');
    const dateStr = d.doneAt ? formatDate(d.doneAt) : '';
    return `
      <div class="fav-item" data-theme="${d.themeId}" data-n="${d.n}">
        <div class="fav-item-body">
          <div class="fav-item-meta">
            <span class="fav-item-theme">${escapeHtml(theme.name)}</span>
            <span class="fav-item-no">№${num}</span>
            ${dateStr ? `<span class="fav-item-no">${dateStr}</span>` : ''}
          </div>
          <div class="fav-item-title">${escapeHtml(idea.title)}</div>
        </div>
        <button class="fav-item-remove done-remove" aria-label="執筆済み解除" title="執筆済み解除">×</button>
      </div>
    `;
  }).join('');
  doneListEl.innerHTML = `<div class="fav-list">${items}</div>`;
  doneListEl.querySelectorAll('.fav-item').forEach(el => {
    const themeId = el.dataset.theme;
    const n = Number(el.dataset.n);
    el.addEventListener('click', (e) => {
      if (e.target.closest('.fav-item-remove')) return;
      openIdea(themeId, n);
    });
    el.querySelector('.fav-item-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(themeId, n);
    });
  });
}

function formatDate(ts) {
  const d = new Date(ts);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}.${m}.${day}`;
}

function openIdea(themeId, n) {
  const theme = DATA.themes.find(t => t.id === themeId);
  if (!theme) return;
  const idea = theme.ideas.find(i => i.n === n);
  if (!idea) return;
  currentIdea = { ...idea, themeName: theme.name, themeId: theme.id };
  switchView('random');
  renderIdea(currentIdea);
  setTimeout(() => {
    ideaStageEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  randomViewEl.style.display = (view === 'random') ? '' : 'none';
  favoritesViewEl.style.display = (view === 'favorites') ? '' : 'none';
  doneViewEl.style.display = (view === 'done') ? '' : 'none';
  if (view === 'favorites') renderFavorites();
  if (view === 'done') renderDones();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchView(tab.dataset.view));
});

function copyIdea() {
  if (!currentIdea) { showToast('先にネタを引いてください'); return; }
  const text = [
    `【${currentIdea.themeName}】No.${currentIdea.n}`,
    `タイトル: ${currentIdea.title}`, ``,
    `■導入文`, currentIdea.intro, ``,
    `■書くべきポイント`,
    ...currentIdea.points.map(p => `・${p}`), ``,
    `■問いかけ`, currentIdea.q
  ].join('\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast('✓ コピーしました'),
      () => fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('✓ コピーしました'); }
  catch { showToast('コピーに失敗しました'); }
  document.body.removeChild(ta);
}

drawBtn.addEventListener('click', drawIdea);
copyBtn.addEventListener('click', copyIdea);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON' && currentView === 'random') {
    e.preventDefault();
    drawIdea();
  }
});

renderThemes();
updateBadges();
</script>

</body>
</html>
